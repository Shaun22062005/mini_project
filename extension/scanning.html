<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhishGuard – Scanning…</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b10;
      --surface: #0e1420;
      --border: rgba(255,255,255,0.08);
      --text: #e8edf5;
      --muted: #6b7a99;
      --accent: #00e5ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 480px;
      width: 90%;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 229, 255, 0.08);
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(0,229,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .url-pill {
      display: inline-block;
      margin-top: 20px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.18);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--accent);
      word-break: break-all;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <div class="title">Scanning for Threats…</div>
    <div class="subtitle">PhishGuard is analysing this URL with the ML model.<br>You will be redirected automatically.</div>
    <div class="url-pill" id="urlDisplay"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const url = params.get("url") || "";
    document.getElementById("urlDisplay").textContent = url;
  </script>
</body>
</html>
